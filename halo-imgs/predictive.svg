<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="280" fill="#0a0a1e"/>
  
  <defs>
    <radialGradient id="gpred" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="280" fill="url(#gpred)"/>
  <!-- Big gauge dial -->
  <circle cx="160" cy="150" r="95" fill="rgba(255,170,0,0.06)" stroke="rgba(255,170,0,0.2)" stroke-width="1.5"/>
  <circle cx="160" cy="150" r="78" fill="none" stroke="rgba(255,170,0,0.15)" stroke-width="12" stroke-dasharray="245 490" transform="rotate(-210 160 150)"/>
  <!-- Good zone (green) -->
  <circle cx="160" cy="150" r="78" fill="none" stroke="#B2FF00" stroke-width="12" stroke-dasharray="100 490" stroke-dashoffset="-0" opacity="0.7" transform="rotate(-210 160 150)"/>
  <!-- Warning zone (orange) -->
  <circle cx="160" cy="150" r="78" fill="none" stroke="#ffaa00" stroke-width="12" stroke-dasharray="60 490" stroke-dashoffset="-100" opacity="0.7" transform="rotate(-210 160 150)"/>
  <!-- Danger zone (red) -->
  <circle cx="160" cy="150" r="78" fill="none" stroke="#ff4455" stroke-width="12" stroke-dasharray="50 490" stroke-dashoffset="-160" opacity="0.7" transform="rotate(-210 160 150)"/>
  <!-- Needle pointing to warning zone -->
  <line x1="160" y1="150" x2="218" y2="88" stroke="#ffaa00" stroke-width="3" stroke-linecap="round"/>
  <circle cx="160" cy="150" r="8" fill="#ffaa00"/>
  <text x="160" y="178" font-family="monospace" font-size="10" fill="#ffaa00" text-anchor="middle">HEALTH</text>
  <text x="160" y="195" font-family="monospace" font-size="18" fill="#ffaa00" text-anchor="middle" font-weight="700">68%</text>
  <text x="160" y="212" font-family="monospace" font-size="8" fill="#ffaa00" opacity="0.6" text-anchor="middle">⚠ service in 14 days</text>
  <!-- Forecast panel right -->
  <rect x="310" y="50" width="250" height="190" rx="5" fill="rgba(255,170,0,0.06)" stroke="rgba(255,170,0,0.25)" stroke-width="1.2"/>
  <text x="326" y="74" font-family="monospace" font-size="9" fill="#ffaa00" opacity="0.8">FAILURE FORECAST</text>
  <!-- Forecast bars -->
  <rect x="326" y="88" width="200" height="14" rx="2" fill="rgba(178,255,0,0.2)" stroke="rgba(178,255,0,0.4)" stroke-width="1"/>
  <rect x="326" y="88" width="180" height="14" rx="2" fill="#B2FF00" opacity="0.5"/>
  <text x="326" y="116" font-family="monospace" font-size="8" fill="#B2FF00" opacity="0.7">Compressor · 94% healthy</text>
  <rect x="326" y="122" width="200" height="14" rx="2" fill="rgba(255,170,0,0.1)" stroke="rgba(255,170,0,0.3)" stroke-width="1"/>
  <rect x="326" y="122" width="136" height="14" rx="2" fill="#ffaa00" opacity="0.5"/>
  <text x="326" y="150" font-family="monospace" font-size="8" fill="#ffaa00" opacity="0.7">Bearing A3 · 68% healthy ⚠</text>
  <rect x="326" y="156" width="200" height="14" rx="2" fill="rgba(255,68,85,0.1)" stroke="rgba(255,68,85,0.3)" stroke-width="1"/>
  <rect x="326" y="156" width="70" height="14" rx="2" fill="#ff4455" opacity="0.5"/>
  <text x="326" y="184" font-family="monospace" font-size="8" fill="#ff4455" opacity="0.9">Seal Ring · 35% healthy ⚠⚠</text>
  <rect x="326" y="190" width="200" height="14" rx="2" fill="rgba(178,255,0,0.2)" stroke="rgba(178,255,0,0.4)" stroke-width="1"/>
  <rect x="326" y="190" width="194" height="14" rx="2" fill="#B2FF00" opacity="0.5"/>
  <text x="326" y="218" font-family="monospace" font-size="8" fill="#B2FF00" opacity="0.7">Motor · 97% healthy</text>
  <rect x="0" y="258" width="600" height="22" fill="rgba(0,0,0,0.6)"/>
  <text x="14" y="273" font-family="monospace" font-size="10" fill="#ffaa00" font-weight="700">PREDICTIVE MAINTENANCE · 95.2% accuracy · industrial IoT</text>

</svg>