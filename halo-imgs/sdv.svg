<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="280" fill="#0a0a1e"/>
  
  <defs>
    <radialGradient id="gsdv" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B2FF00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#B2FF00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="280" fill="url(#gsdv)"/>
  <!-- Road lines -->
  <line x1="0" y1="140" x2="600" y2="140" stroke="rgba(178,255,0,0.08)" stroke-width="60"/>
  <line x1="0" y1="140" x2="600" y2="140" stroke="rgba(0,0,0,0.3)" stroke-width="56"/>
  <line x1="80" y1="140" x2="200" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="20,15"/>
  <line x1="260" y1="140" x2="380" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="20,15"/>
  <line x1="440" y1="140" x2="560" y2="140" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="20,15"/>
  <!-- Car body top-down -->
  <rect x="255" y="100" width="90" height="80" rx="12" fill="rgba(178,255,0,0.18)" stroke="#B2FF00" stroke-width="2.5"/>
  <rect x="270" y="110" width="60" height="55" rx="6" fill="rgba(178,255,0,0.08)" stroke="#B2FF00" stroke-width="1"/>
  <!-- Wheels -->
  <rect x="244" y="103" width="14" height="22" rx="3" fill="#B2FF00" opacity="0.6"/>
  <rect x="342" y="103" width="14" height="22" rx="3" fill="#B2FF00" opacity="0.6"/>
  <rect x="244" y="155" width="14" height="22" rx="3" fill="#B2FF00" opacity="0.6"/>
  <rect x="342" y="155" width="14" height="22" rx="3" fill="#B2FF00" opacity="0.6"/>
  <!-- LIDAR sensor arcs front -->
  <path d="M300 100 A80 80 0 0 1 300 100" fill="none"/>
  <path d="M260 108 Q300 28 340 108" fill="rgba(178,255,0,0.06)" stroke="#B2FF00" stroke-width="1" opacity="0.6"/>
  <path d="M250 108 Q300 10 350 108" fill="rgba(178,255,0,0.04)" stroke="#B2FF00" stroke-width="0.8" opacity="0.4" stroke-dasharray="4,4"/>
  <path d="M238 110 Q300 -15 362 110" fill="rgba(178,255,0,0.02)" stroke="#B2FF00" stroke-width="0.6" opacity="0.25" stroke-dasharray="4,6"/>
  <!-- Radar arcs rear -->
  <path d="M260 172 Q300 222 340 172" fill="rgba(178,255,0,0.04)" stroke="#B2FF00" stroke-width="1" opacity="0.4"/>
  <!-- Side sensors -->
  <line x1="244" y1="140" x2="155" y2="140" stroke="#B2FF00" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="356" y1="140" x2="445" y2="140" stroke="#B2FF00" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <!-- Status indicators -->
  <rect x="30" y="58" width="120" height="48" rx="4" fill="rgba(178,255,0,0.06)" stroke="rgba(178,255,0,0.3)" stroke-width="1"/>
  <text x="40" y="77" font-family="monospace" font-size="8" fill="#B2FF00" opacity="0.7">SPEED</text>
  <text x="40" y="96" font-family="monospace" font-size="18" fill="#B2FF00" font-weight="700">72 km/h</text>
  <rect x="450" y="58" width="120" height="48" rx="4" fill="rgba(178,255,0,0.06)" stroke="rgba(178,255,0,0.3)" stroke-width="1"/>
  <text x="460" y="77" font-family="monospace" font-size="8" fill="#B2FF00" opacity="0.7">AI MODE</text>
  <text x="460" y="96" font-family="monospace" font-size="14" fill="#B2FF00" font-weight="700">ACTIVE ●</text>
  <rect x="0" y="258" width="600" height="22" fill="rgba(0,0,0,0.6)"/>
  <text x="14" y="273" font-family="monospace" font-size="10" fill="#B2FF00" font-weight="700">SDV CRUISE CONTROL · OTA SAFE · mission-critical AI runtime</text>

</svg>